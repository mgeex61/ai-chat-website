<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mgeexAI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">AI</div>
        <div>
          <h1>mgeexAI</h1>
          <p>Gemini Chat</p>
        </div>
      </div>

      <button id="newChatBtn" class="new-chat">+ Neuer Chat</button>

      <div class="sidebar-section">
        <p>Beispiele</p>
        <button class="example-btn">Erkläre mir JavaScript einfach</button>
        <button class="example-btn">Gib mir eine Projektidee</button>
        <button class="example-btn">Hilf mir bei einer Bewerbung</button>
      </div>

      <div class="sidebar-footer">
        <span class="status-dot"></span>
        Gemini verbunden
      </div>
    </aside>

    <main class="chat">
      <header class="chat-header">
        <div>
          <h2>mgeexAI</h2>
          <p>Dein moderner KI-Assistent</p>
        </div>
        <div class="model-pill">Gemini Flash</div>
      </header>

      <section id="welcomeScreen" class="welcome">
        <h3>Wie kann ich dir helfen?</h3>
        <div class="welcome-grid">
          <button class="welcome-card">Schreibe mir eine Projektidee</button>
          <button class="welcome-card">Erkläre mir APIs einfach</button>
          <button class="welcome-card">Verbessere meinen Code</button>
          <button class="welcome-card">Hilf mir beim Lernen</button>
        </div>
      </section>

      <section id="messages" class="messages"></section>

      <div id="typingWrap" class="typing hidden">
        <span></span><span></span><span></span>
      </div>

      <footer class="input-area">
        <div class="input-box">
  <input id="imageInput" type="file" accept="image/*" hidden />
  <button id="imageBtn" type="button">＋</button>
  <textarea id="chatInput" rows="1" placeholder="Nachricht an mgeexAI..."></textarea>
  <button id="sendBtn">➤</button>
</div>

<div id="imagePreview" class="image-preview hidden"></div>
        </div>
        <p class="hint">mgeexAI kann Fehler machen. Prüfe wichtige Informationen.</p>
      </footer>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
